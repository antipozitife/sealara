# Пример единого домена для SPA и API за nginx.
# Подставьте server_name и пути к собранному фронту (npm run build → dist/).
#
# Переменные окружения API:
#   FRONTEND_ORIGIN=https://ваш-домен.ru
#   PUBLIC_API_URL=   (оставьте пустым при такой схеме — аватары как /uploads/...)
#   TRUST_PROXY_HOPS=1

upstream sealara_api {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name example.com;

  # ssl_certificate /path/fullchain.pem;
  # ssl_certificate_key /path/privkey.pem;

  root /var/www/sealara/dist;
  index index.html;

  location /api/ {
    proxy_pass http://sealara_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /uploads/ {
    proxy_pass http://sealara_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  location /metrics {
    deny all;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
